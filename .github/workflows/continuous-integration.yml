# Continuous Integration Workflow for adaptived
#
# Note: based on libcgroup's continuous-integration.yml
#

name: Continuous Integration
on: ["push", "pull_request"]

permissions:
  contents: read

jobs:
  # Doc: https://github.com/redhat-plumbers-in-action/differential-shellcheck#usage
  differential-shellcheck:
    name: Differential ShellCheck
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Differential ShellCheck
        uses: redhat-plumbers-in-action/differential-shellcheck@d965e66ec0b3b2f821f75c8eff9b12442d9a7d1e # v5.5.6
        with:
          severity: warning
          token: ${{ secrets.GITHUB_TOKEN }}

  flake8-lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python environment
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4.9.1
        with:
          python-version: "3.8"
      - name: flake8 Lint
        uses: reviewdog/action-flake8@b65981e158319f08cb7d0132f28bc0081e110adc # v3.15.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  checkpatch:
    name: Checkpatch Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: 'Calculate PR commits + 1'
        run: echo "PR_FETCH_DEPTH=$(( ${{ github.event.pull_request.commits }} + 1 ))" >> $GITHUB_ENV
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: ${{ env.PR_FETCH_DEPTH }}
      - name: Run checkpatch review
        uses: webispy/checkpatch-action@58374fe5bb03358b23d3d6871e2ff290ce77fcd2 # v9
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

  distcheck_cgv2:
    name: Adaptived make distcheck v2
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: false
    - name: Initialize the directory
      uses: ./.github/actions/setup-adaptived
    - name: Run make distcheck
      run: cd adaptived && make distcheck
    - name: Display test logs
      if: ${{ failure() }}
      run: |
        cat adaptived/adaptived-*/_build/sub/tests/ftests/ftests-wrapper.sh.log
        cat adaptived/adaptived-*/_build/sub/tests/ftests/ftests-c-wrapper.sh.log

  build-with-clang:
    name: Build with Clang
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: false
    - name: Fail on all warnings
      run: |
        CFLAGS=-Werror
        export CFLAGS
    - name: Install Dependencies
      run: |
        while sudo fuser /var/{lib/{dpkg,apt/lists},cache/apt/archives}/lock >/dev/null 2>&1; do sleep 3; done
        sudo apt-get update
        sudo apt-get install libjson-c-dev lcov cmake bison flex autoconf automake libtool libsystemd-dev clang -y
    - name: Build adaptived
      run: cd adaptived && ./autogen.sh && ./configure && make check-build
    - name: Run functional tests
      run: cd adaptived && make check
    - name: Display test logs
      if: ${{ always() }}
      run: |
        cat adaptived/tests/ftests/ftests-wrapper.sh.log
        cat adaptived/tests/ftests/ftests-c-wrapper.sh.log

  functional_tests_cgv2:
    name: Adaptived Functional Tests v2
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: false
    - name: Fail on all warnings
      run: |
        CFLAGS=-Werror
        export CFLAGS
    - name: Initialize the directory
      uses: ./.github/actions/setup-adaptived
    - name: Run functional tests
      run: cd adaptived && make check
    - name: Display test logs
      if: ${{ always() }}
      run: |
        cat adaptived/tests/ftests/ftests-wrapper.sh.log
        cat adaptived/tests/ftests/ftests-c-wrapper.sh.log
    - name: Collate code coverage results
      uses: ./.github/actions/code-coverage
    - name: Upload code coverage results
      uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: ./lcov.total
        flag-name: "Adaptived Functional Tests - cgv2"
        parallel: True

  finalize:
    name: Finalize the test run
    if: ${{ always() }}
    needs: [functional_tests_cgv2]
    runs-on: ubuntu-latest
    steps:
    - name: Finalize code coverage results
      uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        parallel-finished: True
